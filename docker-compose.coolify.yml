version: '3.8'

services:
  # 1. App (Nuxt 4)
  app:
    build:
      context: ./app
      dockerfile: Dockerfile.prod
    container_name: ceoris-nuxt
    restart: always
    expose:
      - "3000"
    environment:
      - NUXT_PUBLIC_API_BASE=${NUXT_PUBLIC_API_BASE:-http://server:12000}
    networks:
      - ceoris_net
    depends_on:
      - server

  # 2. Server (Go Fiber)
  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: ceoris-goserver
    restart: always
    expose:
      - "12000"
    volumes:
      - ./data/notebooks:/root/data/notebooks
    environment:
      - ENV=production
      - PORT=12000
      - TIMEZONE=${TIMEZONE:-America/Sao_Paulo}
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD}
      - DISCORD_APP_ID=${DISCORD_APP_ID}
      - DISCORD_PUBLIC_KEY=${DISCORD_PUBLIC_KEY}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - POCKETBASE_URL=http://database:8090
    networks:
      - ceoris_net
    depends_on:
      - database

  # 3. Banco de Dados (PocketBase Customizado)
  database:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: ceoris-pocketbase
    restart: always
    expose:
      - "8090"
    volumes:
      - ./db/pb_data:/root/pb_data
      - ./db/pb_migrations:/root/pb_migrations
    environment:
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD}
    networks:
      - ceoris_net
    command: ["./main", "serve", "--http=0.0.0.0:8090"]

networks:
  ceoris_net:
    driver: bridge
